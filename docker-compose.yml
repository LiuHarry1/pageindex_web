services:
  backend:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_workspace:/app/workspace
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root@host.docker.internal:3306/knowbot
      - LLM_BASE_URL=http://host.docker.internal:4141/v1
      - LLM_API_KEY=not-needed
      - INDEX_MODEL=gpt-4
      - RETRIEVE_MODEL=gpt-4
    restart: unless-stopped

  frontend:
    build:
      context: web/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_workspace:
